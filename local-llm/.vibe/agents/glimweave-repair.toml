agent_type = "agent"
display_name = "Glimweave Repair"
description = "Persistent evidence-driven repair owner for the Glimweave experiment."
safety = "destructive"
active_model = "mistral-medium-3.5"
system_prompt_id = "glimweave-repair"
compaction_prompt_id = "glimweave-compact"
auto_compact_threshold = 60000
enabled_tools = ["read_file", "grep", "edit", "write_file", "bash"]
disabled_skills = ["*"]
enable_connectors = false
include_project_context = false
bypass_tool_permissions = true

[tools.bash]
permission = "always"
max_output_bytes = 24000
default_timeout = 120

[tools.read_file]
permission = "always"
max_read_bytes = 16000

[tools.grep]
permission = "always"
max_output_bytes = 32000
default_max_matches = 100

[tools.edit]
permission = "always"

[tools.write_file]
permission = "always"
max_write_bytes = 64000
