<!DOCTYPE html>
<!--
  Vector Earth - 3D Globe Frontend
  =================================
  Renders country polygons on a CesiumJS globe, fetching GeoJSON from the
  local FastAPI backend.

  Adding a new layer
  ------------------
  1. Ingest the data into the SQLite DB (see ingest/).
  2. The GET /layers endpoint will auto-discover it.
  3. Call loadLayer('<layer_name>') below to add it to the globe.

  Enabling satellite imagery
  --------------------------
  Find the IMAGERY HOOK section below and call setImageryProvider() with
  any Cesium-compatible provider. No other changes are needed.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vector Earth</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #cesiumContainer { width: 100%; height: 100%; overflow: hidden; }

    .panel {
      position: absolute;
      background: rgba(22, 28, 36, 0.88);
      color: #e0e0e0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    #ui {
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      pointer-events: none;
      line-height: 1.6;
    }

    #ui strong { color: #ffffff; }

    #search-wrap {
      top: 12px;
      right: 12px;
      padding: 8px 10px;
      width: 240px;
    }

    #search-wrap input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
    }

    #search-wrap input::placeholder { color: #778; }

    #suggestions {
      margin-top: 6px;
      display: none;
    }

    #suggestions div {
      padding: 4px 2px;
      cursor: pointer;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #suggestions div:hover,
    #suggestions div.active {
      background: rgba(168,216,240,0.18);
      color: #a8d8f0;
    }

    #info {
      bottom: 12px;
      right: 12px;
      padding: 10px 14px;
      min-width: 190px;
      display: none;
      line-height: 1.8;
    }

    #info .info-name  { font-size: 15px; font-weight: 600; color: #ffffff; margin-bottom: 4px; }
    #info .info-row   { display: flex; justify-content: space-between; gap: 16px; }
    #info .info-label { color: #778899; }
    #info .info-value { color: #d0e8f8; }

    #info .info-close {
      float: right;
      cursor: pointer;
      color: #556;
      font-size: 15px;
      line-height: 1;
      margin-left: 8px;
    }

    #info .info-close:hover { color: #a8d8f0; }

    #status {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(22, 28, 36, 0.72);
      color: #778899;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 4px;
      max-width: min(70vw, 640px);
    }
  </style>
</head>
<body>

<div id="cesiumContainer"></div>

<div id="ui" class="panel">
  <strong>Vector Earth</strong><br />
  Drag to rotate | Scroll to zoom<br />
  Right-drag to tilt
</div>

<div id="search-wrap" class="panel">
  <input id="search-input" type="text" placeholder="Search country..." autocomplete="off" />
  <div id="suggestions"></div>
</div>

<div id="info" class="panel">
  <span class="info-close" id="info-close">x</span>
  <div class="info-name" id="info-name"></div>
  <div class="info-row"><span class="info-label">Continent</span><span class="info-value" id="info-continent"></span></div>
  <div class="info-row"><span class="info-label">ISO code</span><span class="info-value" id="info-iso"></span></div>
  <div class="info-row"><span class="info-label">Population</span><span class="info-value" id="info-pop"></span></div>
  <div class="info-row"><span class="info-label">GDP (est.)</span><span class="info-value" id="info-gdp"></span></div>
</div>

<div id="status">Loading countries...</div>

<script>
  const statusEl = document.getElementById('status');
  const infoEl = document.getElementById('info');
  const infoNameEl = document.getElementById('info-name');
  const infoContinentEl = document.getElementById('info-continent');
  const infoIsoEl = document.getElementById('info-iso');
  const infoPopEl = document.getElementById('info-pop');
  const infoGdpEl = document.getElementById('info-gdp');
  const infoCloseEl = document.getElementById('info-close');
  const searchInput = document.getElementById('search-input');
  const suggestionsEl = document.getElementById('suggestions');

  let viewer = null;
  let pickHandler = null;
  let countriesLayerSource = null;
  let activeSuggestion = -1;

  const featureIndex = Object.create(null);

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function setErrorStatus(msg, err) {
    if (err) {
      console.error(msg, err);
    } else {
      console.error(msg);
    }
    setStatus(msg);
  }

  function getApiBase() {
    if (window.VECTOR_EARTH_API_BASE) {
      return String(window.VECTOR_EARTH_API_BASE).replace(/\/$/, '');
    }

    const { protocol, hostname, port, origin } = window.location;
    if (protocol === 'file:') {
      return 'http://localhost:8000';
    }
    if (port === '8000') {
      return origin;
    }
    if (hostname === 'localhost' || hostname === '127.0.0.1') {
      return `${protocol}//${hostname}:8000`;
    }
    return origin;
  }

  const API_BASE = getApiBase();

  function ensureCesiumLoaded() {
    if (window.Cesium) {
      return true;
    }
    setErrorStatus('Cesium failed to load from the CDN. Check your network or reload the page.');
    return false;
  }

  function getContinentFillColor(continent) {
    const colors = {
      'Africa': '#c8a838',
      'Antarctica': '#aaddff',
      'Asia': '#e07840',
      'Europe': '#6aaa6a',
      'North America': '#7878d0',
      'Oceania': '#d06868',
      'Seven seas (open ocean)': '#4499bb',
      'South America': '#44b8a0',
    };
    const hex = colors[continent] || '#a8d8f0';
    return Cesium.Color.fromCssColorString(hex).withAlpha(0.62);
  }

  function getContinentOutlineColor(continent) {
    const colors = {
      'Africa': '#e8c84a',
      'Antarctica': '#cceeff',
      'Asia': '#f09050',
      'Europe': '#88cc88',
      'North America': '#9898e8',
      'Oceania': '#e88888',
      'Seven seas (open ocean)': '#66bbdd',
      'South America': '#55ccb8',
    };
    return Cesium.Color.fromCssColorString(colors[continent] || '#a8d8f0');
  }

  function configureViewer() {
    viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
    });

    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0d0d0d');
    viewer.scene.skyBox.show = false;
    viewer.scene.sun.show = false;
    viewer.scene.moon.show = false;
    viewer.scene.skyAtmosphere.show = false;
    viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#1a2a3a');
  }

  function setImageryProvider(provider) {
    if (!viewer) return;
    viewer.scene.imageryLayers.removeAll();
    viewer.scene.imageryLayers.addImageryProvider(provider);
  }

  function geomBbox(geometry) {
    let minLon = Infinity;
    let minLat = Infinity;
    let maxLon = -Infinity;
    let maxLat = -Infinity;

    function scanRing(ring) {
      for (const [lon, lat] of ring) {
        if (lon < minLon) minLon = lon;
        if (lon > maxLon) maxLon = lon;
        if (lat < minLat) minLat = lat;
        if (lat > maxLat) maxLat = lat;
      }
    }

    if (geometry.type === 'Polygon') {
      geometry.coordinates.forEach(scanRing);
    } else if (geometry.type === 'MultiPolygon') {
      geometry.coordinates.forEach(poly => poly.forEach(scanRing));
    }

    return { minLon, minLat, maxLon, maxLat };
  }

  function buildFeatureIndex(features) {
    Object.keys(featureIndex).forEach(key => delete featureIndex[key]);

    for (const feature of features) {
      if (!feature.geometry) continue;
      const name = feature.properties?.name;
      if (!name) continue;

      featureIndex[name.toLowerCase()] = {
        name,
        properties: feature.properties,
        bbox: geomBbox(feature.geometry),
      };
    }
  }

  function getPropertyValue(properties, key) {
    const value = properties?.[key];
    if (value && typeof value.getValue === 'function') {
      return value.getValue(Cesium.JulianDate.now());
    }
    return value ?? null;
  }

  function getEntityInfo(entity) {
    const properties = entity?.properties;
    return {
      name: getPropertyValue(properties, 'name') || entity?.name || '-',
      continent: getPropertyValue(properties, 'continent') || '-',
      iso_a3: getPropertyValue(properties, 'iso_a3') || '-',
      pop_est: getPropertyValue(properties, 'pop_est'),
      gdp_md: getPropertyValue(properties, 'gdp_md'),
    };
  }

  function styleCountryEntities(dataSource) {
    let styledCount = 0;

    for (const entity of dataSource.entities.values) {
      if (!entity.polygon) {
        continue;
      }

      const continent = getPropertyValue(entity.properties, 'continent');
      entity.polygon.fill = true;
      entity.polygon.material = new Cesium.ColorMaterialProperty(getContinentFillColor(continent));
      entity.polygon.outline = true;
      entity.polygon.outlineColor = getContinentOutlineColor(continent);
      entity.polygon.outlineWidth = 1;
      entity.polygon.height = 0;
      entity.polygon.perPositionHeight = false;
      entity.polygon.arcType = Cesium.ArcType.GEODESIC;
      styledCount += 1;
    }

    return styledCount;
  }

  async function loadLayer(layerName) {
    setStatus(`Loading ${layerName} from ${API_BASE}...`);

    let geojson;
    try {
      const response = await fetch(`${API_BASE}/layers/${layerName}`);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      geojson = await response.json();
    } catch (err) {
      setErrorStatus(`Error loading layer '${layerName}'. Check that the API is running at ${API_BASE}.`, err);
      return false;
    }

    try {
      buildFeatureIndex(geojson.features || []);
      if (countriesLayerSource) {
        viewer.dataSources.remove(countriesLayerSource, true);
      }

      countriesLayerSource = await Cesium.GeoJsonDataSource.load(geojson, {
        clampToGround: false,
        stroke: Cesium.Color.fromCssColorString('#dfeaf4'),
        strokeWidth: 1,
        fill: Cesium.Color.fromCssColorString('#8fbfd4').withAlpha(0.6),
      });

      for (const entity of countriesLayerSource.entities.values) {
        if (entity.polygon) {
          entity.polygon.fill = true;
        }
      }

      const styledPolygons = styleCountryEntities(countriesLayerSource);
      await viewer.dataSources.add(countriesLayerSource);
      if (styledPolygons === 0) {
        throw new Error('No polygon entities could be styled from the layer data.');
      }
      return true;
    } catch (err) {
      setErrorStatus(`Layer '${layerName}' loaded but could not be rendered safely.`, err);
      return false;
    }
  }

  function hideSuggestions() {
    suggestionsEl.style.display = 'none';
    suggestionsEl.innerHTML = '';
    activeSuggestion = -1;
  }

  function showInfo(props) {
    infoNameEl.textContent = props.name || '-';
    infoContinentEl.textContent = props.continent || '-';
    infoIsoEl.textContent = props.iso_a3 || '-';
    infoPopEl.textContent = props.pop_est ? Number(props.pop_est).toLocaleString() : '-';
    infoGdpEl.textContent = props.gdp_md ? '$' + Number(props.gdp_md).toLocaleString() + ' M' : '-';
    infoEl.style.display = 'block';
  }

  function focusCountry(key) {
    if (!viewer) return;
    const entry = featureIndex[key.toLowerCase()];
    if (!entry) return;

    const { minLon, minLat, maxLon, maxLat } = entry.bbox;
    const centerLon = (minLon + maxLon) / 2;
    const centerLat = (minLat + maxLat) / 2;
    const spanDeg = Math.max(maxLon - minLon, maxLat - minLat);
    const heightM = Math.min(Math.max(spanDeg * 120000, 400000), 12000000);

    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, heightM),
      duration: 1.8,
    });

    showInfo(entry.properties);
    searchInput.value = entry.name;
    hideSuggestions();
  }

  function renderSuggestions(matches) {
    suggestionsEl.innerHTML = '';
    activeSuggestion = -1;

    if (matches.length === 0) {
      hideSuggestions();
      return;
    }

    matches.forEach(key => {
      const entry = featureIndex[key];
      const div = document.createElement('div');
      div.textContent = entry.name;
      div.addEventListener('mousedown', event => {
        event.preventDefault();
        focusCountry(key);
      });
      suggestionsEl.appendChild(div);
    });

    suggestionsEl.style.display = 'block';
  }

  function installSearchHandlers() {
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      if (query.length < 1) {
        hideSuggestions();
        return;
      }

      const matches = Object.keys(featureIndex)
        .filter(key => key.includes(query))
        .sort((a, b) => {
          const aStarts = a.startsWith(query);
          const bStarts = b.startsWith(query);
          if (aStarts && !bStarts) return -1;
          if (!aStarts && bStarts) return 1;
          return a.localeCompare(b);
        })
        .slice(0, 8);

      renderSuggestions(matches);
    });

    searchInput.addEventListener('keydown', event => {
      const items = suggestionsEl.querySelectorAll('div');

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        activeSuggestion = Math.min(activeSuggestion + 1, items.length - 1);
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        activeSuggestion = Math.max(activeSuggestion - 1, -1);
      } else if (event.key === 'Enter') {
        if (activeSuggestion >= 0 && items[activeSuggestion]) {
          items[activeSuggestion].dispatchEvent(new Event('mousedown'));
        } else if (items.length > 0) {
          items[0].dispatchEvent(new Event('mousedown'));
        }
        return;
      } else if (event.key === 'Escape') {
        hideSuggestions();
        return;
      } else {
        return;
      }

      items.forEach((el, index) => {
        el.classList.toggle('active', index === activeSuggestion);
      });
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(hideSuggestions, 150);
    });

    infoCloseEl.addEventListener('click', () => {
      infoEl.style.display = 'none';
    });
  }

  function installInteractionHandlers() {
    if (!viewer) return;

    pickHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    pickHandler.setInputAction(movement => {
      const picked = viewer.scene.pick(movement.position);
      const entity = picked?.id;
      const info = getEntityInfo(entity);
      const name = info.name;
      if (!name) return;

      const entry = featureIndex[name.toLowerCase()];
      if (entry) {
        showInfo(entry.properties);
      } else if (entity) {
        showInfo(info);
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
  }

  async function boot() {
    setStatus('Loading countries...');
    installSearchHandlers();

    if (!ensureCesiumLoaded()) {
      return;
    }

    try {
      Cesium.Ion.defaultAccessToken = '';
      configureViewer();
      installInteractionHandlers();

      const loaded = await loadLayer('countries');
      if (!loaded) return;

      setStatus('Vector Earth | Natural Earth 1:10m | public domain');
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(10.0, 20.0, 22000000),
        duration: 2,
      });
    } catch (err) {
      setErrorStatus('Vector Earth could not initialize. Check the browser console for details.', err);
    }
  }

  boot();
</script>

</body>
</html>
