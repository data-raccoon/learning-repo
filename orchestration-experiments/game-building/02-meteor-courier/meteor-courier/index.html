<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ORBIT RUNNER</title><link rel="stylesheet" href="styles.css"></head>
<body><main class="game-shell"><header class="topbar"><div><p class="subtitle">DODGE &amp; COLLECT</p><h1>ORBIT RUNNER</h1></div></header>
<section class="hud" aria-label="Game status"><span>SCORE:: <strong id="score">0</strong></span><span>LIVES:: <strong id="lives">3</strong></span><span>LEVEL:: <strong id="level">1</strong></span></section>
<div class="stage"><canvas id="game" width="720" height="480" aria-label="Meteor Courier game area"></canvas><div id="overlay" class="overlay"><p id="message">Avoid meteors to collect energy orbs. Survive longer for higher scores!</p><button id="start-btn" type="button">START</button></div></div><p class="help">↑/↓: Move | ←/→: Rotate | Tap: Boost</p><output id="smoke-result" hidden>PENDING</output></main>
<script src="config/game-data.js"></script><script src="src/game.js"></script><script src="smoke.js"></script></body></html>
